<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dance Show Planner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f4f7fb; min-height: 100vh; color: #1a3a5c; }

  header { background: #fff; border-bottom: 1px solid #d0dcea; padding: 14px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 700; color: #1a3a5c; }
  .toolbar-btns { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

  button {
    font-size: 12px; font-weight: 500; padding: 6px 14px;
    border-radius: 6px; border: 1px solid #b0c8e8;
    background: #fff; cursor: pointer; color: #1a3a5c; transition: background 0.15s;
  }
  button:hover { background: #e8f0fb; }
  .btn-add { background: #dce9f5; border-color: #4a82c4; }
  .btn-add:hover { background: #c4d9ef; }
  .btn-danger { background: #fde; border-color: #e0a0a0; color: #800; font-size: 11px; padding: 4px 10px; }
  .btn-danger:hover { background: #fcc; }

  .main { display: flex; gap: 0; height: calc(100vh - 57px); }

  .sidebar {
    width: 300px; min-width: 260px; background: #fff; border-right: 1px solid #d0dcea;
    overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: #6a8fb0; text-transform: uppercase; margin-bottom: 4px; }

  .card {
    background: #fff; border: 1px solid #d0dcea; border-radius: 8px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .card-header { display: flex; align-items: center; gap: 8px; }
  .card-num { width: 22px; height: 22px; border-radius: 50%; background: #dce9f5; color: #1a5fa8; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-title-input { flex: 1; font-size: 13px; font-weight: 600; border: none; background: transparent; outline: none; color: #1a3a5c; }
  .field-row { display: flex; flex-direction: column; gap: 2px; }
  .field-label { font-size: 10px; font-weight: 600; color: #6a8fb0; text-transform: uppercase; letter-spacing: 0.05em; }
  textarea, input[type="text"], input[type="number"] {
    width: 100%; font-size: 12px; padding: 5px 8px;
    border: 1px solid #d0dcea; border-radius: 5px;
    background: #f4f7fb; color: #1a3a5c; resize: none;
    font-family: inherit; outline: none; transition: border-color 0.15s;
  }
  textarea:focus, input:focus { border-color: #4a82c4; background: #fff; }

  .trans-card { background: #f0faf4; border: 1px dashed #7cc494; }
  .trans-label { font-size: 11px; font-weight: 700; color: #1a6640; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .trans-arrow { font-size: 14px; }

  .diagram-area { flex: 1; overflow: auto; padding: 24px; }
  .canvas { position: relative; width: 760px; min-height: 600px; margin: 0 auto; }

  .node { position: absolute; cursor: pointer; user-select: none; }
  .box {
    background: #dce9f5; border: 1.5px solid #4a82c4; border-radius: 8px;
    padding: 10px 14px; min-width: 130px; text-align: center;
    font-weight: 600; font-size: 13px; color: #1a3a5c; position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .box:hover { background: #c4d9ef; border-color: #1a5fa8; }
  .box.highlighted { background: #fff3cd !important; border-color: #e6a817 !important; box-shadow: 0 0 0 2px #e6a81740; }
  .box.highlighted-trans { background: #d4edda !important; border-color: #28a745 !important; box-shadow: 0 0 0 2px #28a74540; }
  .box-title { font-size: 13px; font-weight: 700; color: #1a3a5c; line-height: 1.3; }
  .box-sub { font-size: 10px; font-weight: 400; color: #3a6090; margin-top: 3px; }

  .trans-node .box { background: #e8f5e9; border-color: #52ab6e; border-style: dashed; min-width: 120px; }
  .trans-node .box:hover { background: #c8e6c9; }

  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 50%; transform: translateX(-50%);
    background: #fff; border: 1px solid #b0c8e8; border-radius: 8px;
    min-width: 240px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.14);
    display: none; padding: 6px 0;
  }
  .node:hover .dropdown, .node:focus-within .dropdown { display: block; }
  .dd-section { padding: 5px 12px 2px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; color: #6a8fb0; text-transform: uppercase; }
  .dd-item { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: default; font-size: 12px; color: #1a3a5c; transition: background 0.1s; }
  .dd-item:hover { background: #e8f3fc; }
  .dd-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dd-dot.dancer { background: #4a82c4; }
  .dd-dot.prop { background: #e6a817; }
  .dd-name { flex: 1; font-weight: 500; }
  .dd-loc { font-size: 10px; color: #6a8fb0; font-style: italic; text-align: right; max-width: 110px; }

  svg.arrows { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }

  .legend { display: flex; gap: 18px; padding: 10px 0 16px; font-size: 11px; color: #5a7a9a; align-items: center; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-line { display: inline-block; width: 20px; height: 2px; background: #4a82c4; }
  .leg-dashed { border-top: 2px dashed #52ab6e; }

  .summary-panel {
    position: fixed; top: 0; right: 0; width: 320px; height: 100vh;
    background: #fff; border-left: 1px solid #d0dcea; overflow-y: auto;
    padding: 16px; z-index: 500; display: none; flex-direction: column; gap: 10px;
  }
  .summary-panel.open { display: flex; }
  .summary-close { align-self: flex-end; }
  .srow { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-bottom: 1px solid #eef2f8; }
  .srow:last-child { border-bottom: none; }
  .srow-name { font-weight: 500; }
  .srow-loc { font-size: 11px; color: #6a8fb0; text-align: right; max-width: 180px; }

  @media (max-width: 700px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #d0dcea; }
    .diagram-area { padding: 12px; }
    .canvas { width: 100%; min-width: 400px; }
  }
</style>
</head>
<body>

<header>
  <h1>Dance Show Planner</h1>
  <div class="toolbar-btns">
    <button class="btn-add" onclick="addDance()">+ Add Dance</button>
    <button onclick="toggleSummary()">Dancer Overview</button>
  </div>
</header>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="diagram-area">
    <div class="canvas" id="canvas">
      <svg class="arrows" id="svg-arrows">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#4a82c4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
          <marker id="arr-t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#52ab6e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
      </svg>
      <div id="nodes-container"></div>
    </div>
  </div>
</div>

<div class="summary-panel" id="summary-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-weight:700;font-size:14px;color:#1a3a5c">Dancer & Prop Overview</span>
    <button class="summary-close" onclick="toggleSummary()">Close</button>
  </div>
  <div id="summary-content"></div>
</div>

<script>
let STATE = {
  dances:[
    {id:'d1',title:'Opening Number',dur:'3:30',dancers:'Anna, Mia, Luca, Sofia',props:'Fans, Scarves',notes:'Full ensemble on stage'},
    {id:'d2',title:'Solo — Mia',dur:'2:15',dancers:'Mia',props:'None',notes:'Spotlight center stage'},
    {id:'d3',title:'Duet — Luca & Sofia',dur:'4:00',dancers:'Luca, Sofia',props:'Ribbons',notes:'Blue lighting at 1:30'},
    {id:'d4',title:'Finale',dur:'5:00',dancers:'Anna, Mia, Luca, Sofia',props:'Flags, Confetti',notes:'Curtain call follows'}
  ],
  transitions:[
    {id:'t1',after:'d1',dancers:'Anna exits, Mia stays',props:'Remove fans, add chairs',dur:'1:00',notes:'Stage right wings'},
    {id:'t2',after:'d2',dancers:'Mia exits, Luca + Sofia enter',props:'Clear all',dur:'0:45',notes:''},
    {id:'t3',after:'d3',dancers:'All dancers enter',props:'Add finale flags',dur:'1:30',notes:'Full blackout'}
  ]
};
let nextId = 5;

function getDancers(str){return str.split(',').map(s=>s.trim()).filter(Boolean)}
function getProps(str){return str.split(',').map(s=>s.trim()).filter(Boolean).filter(p=>p.toLowerCase()!=='none')}

function whereIsDancer(name){
  const locs=[];
  STATE.dances.forEach(d=>{
    if(getDancers(d.dancers).map(x=>x.toLowerCase()).includes(name.toLowerCase()))
      locs.push({type:'dance',id:d.id,label:d.title});
  });
  STATE.transitions.forEach(t=>{
    if((t.dancers||'').toLowerCase().includes(name.toLowerCase()))
      locs.push({type:'trans',id:t.id,label:'T'+(STATE.dances.findIndex(d=>d.id===t.after)+1)+'→'+(STATE.dances.findIndex(d=>d.id===t.after)+2)});
  });
  return locs;
}
function whereIsProp(name){
  const locs=[];
  STATE.dances.forEach(d=>{
    if(getProps(d.props).map(x=>x.toLowerCase()).includes(name.toLowerCase()))
      locs.push({type:'dance',id:d.id,label:d.title});
  });
  STATE.transitions.forEach(t=>{
    if((t.props||'').toLowerCase().includes(name.toLowerCase()))
      locs.push({type:'trans',id:t.id,label:'T'+(STATE.dances.findIndex(d=>d.id===t.after)+1)+'→'+(STATE.dances.findIndex(d=>d.id===t.after)+2)});
  });
  return locs;
}

function allDancers(){
  const s=new Set();
  STATE.dances.forEach(d=>getDancers(d.dancers).forEach(n=>s.add(n)));
  return [...s].sort();
}
function allProps(){
  const s=new Set();
  STATE.dances.forEach(d=>getProps(d.props).forEach(p=>s.add(p)));
  return [...s].sort();
}

function highlightFor(name, type){
  document.querySelectorAll('.box').forEach(el=>el.classList.remove('highlighted','highlighted-trans'));
  if(!name) return;
  const locs = type==='dancer'?whereIsDancer(name):whereIsProp(name);
  locs.forEach(loc=>{
    const el = document.querySelector(`[data-nodeid="${loc.id}"] .box`);
    if(el) el.classList.add(loc.type==='dance'?'highlighted':'highlighted-trans');
  });
}

function buildDropdown(nodeId, isDance){
  const dancers = isDance
    ? getDancers(STATE.dances.find(d=>d.id===nodeId)?.dancers||'')
    : getDancers(STATE.transitions.find(t=>t.id===nodeId)?.dancers||'');
  const props = isDance
    ? getProps(STATE.dances.find(d=>d.id===nodeId)?.props||'')
    : getProps(STATE.transitions.find(t=>t.id===nodeId)?.props||'');
  let html = '<div class="dropdown">';
  if(dancers.length){
    html += '<div class="dd-section">Dancers</div>';
    dancers.forEach(n=>{
      const locs = whereIsDancer(n).map(l=>l.label).join(', ');
      html += `<div class="dd-item" onmouseenter="highlightFor('${n.replace(/'/g,"\\'")}','dancer')" onmouseleave="highlightFor(null)"><span class="dd-dot dancer"></span><span class="dd-name">${n}</span><span class="dd-loc">${locs}</span></div>`;
    });
  }
  if(props.length){
    html += '<div class="dd-section" style="margin-top:4px">Props</div>';
    props.forEach(p=>{
      const locs = whereIsProp(p).map(l=>l.label).join(', ');
      html += `<div class="dd-item" onmouseenter="highlightFor('${p.replace(/'/g,"\\'")}','prop')" onmouseleave="highlightFor(null)"><span class="dd-dot prop"></span><span class="dd-name">${p}</span><span class="dd-loc">${locs}</span></div>`;
    });
  }
  if(!dancers.length && !props.length) html += '<div class="dd-item" style="color:#aaa;font-style:italic">Nothing assigned yet</div>';
  html += '</div>';
  return html;
}

function getLayout(){
  const layout=[];
  const dx=220, dy=160, startX=80, startY=40;
  STATE.dances.forEach((d,i)=>{
    layout.push({type:'dance',id:d.id, x:startX, y:startY+i*dy, w:170, h:62});
  });
  STATE.transitions.forEach((t,i)=>{
    layout.push({type:'trans',id:t.id, x:startX+dx, y:startY+40+i*dy, w:155, h:56});
  });
  return layout;
}

function renderDiagram(){
  const layout = getLayout();
  const container = document.getElementById('nodes-container');
  container.innerHTML='';
  const maxY = Math.max(...layout.map(n=>n.y+(n.h||60)))+60;
  document.getElementById('canvas').style.minHeight = maxY+'px';

  layout.forEach(n=>{
    const div=document.createElement('div');
    div.className='node '+(n.type==='trans'?'trans-node':'');
    div.setAttribute('data-nodeid',n.id);
    div.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.w}px`;
    let inner='';
    if(n.type==='dance'){
      const d=STATE.dances.find(x=>x.id===n.id);
      inner=`<div class="box"><div class="box-title">${esc(d.title)}</div><div class="box-sub">${esc(d.dur)} &middot; ${getDancers(d.dancers).length} dancer${getDancers(d.dancers).length!==1?'s':''}</div>${buildDropdown(n.id,true)}</div>`;
    } else {
      const t=STATE.transitions.find(x=>x.id===n.id);
      const ai=STATE.dances.findIndex(d=>d.id===t.after);
      inner=`<div class="box"><div class="box-title">Transition ${ai+1} &rarr; ${ai+2}</div><div class="box-sub">${esc(t.dur)||'—'}</div>${buildDropdown(n.id,false)}</div>`;
    }
    div.innerHTML=inner;
    container.appendChild(div);
  });
  drawArrows(layout);
}

function getCenter(layout,id){
  const n=layout.find(x=>x.id===id);
  if(!n) return null;
  const h=n.h||60;
  return{x:n.x+n.w/2, y:n.y+h/2, top:n.y, bot:n.y+h, left:n.x, right:n.x+n.w, mid_y:n.y+h/2};
}

function drawArrows(layout){
  const svg=document.getElementById('svg-arrows');
  while(svg.children.length>1) svg.removeChild(svg.lastChild);

  STATE.dances.forEach((d,i)=>{
    const a=getCenter(layout,d.id);
    const t=STATE.transitions.find(tr=>tr.after===d.id);
    if(t){
      const b=getCenter(layout,t.id);
      const line=document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d',`M${a.right} ${a.mid_y} L${b.left} ${b.mid_y}`);
      line.setAttribute('stroke','#52ab6e'); line.setAttribute('stroke-width','1.5');
      line.setAttribute('stroke-dasharray','5 3'); line.setAttribute('fill','none');
      line.setAttribute('marker-end','url(#arr-t)');
      svg.appendChild(line);
    }
    if(i+1<STATE.dances.length){
      const b=getCenter(layout,STATE.dances[i+1].id);
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',a.x); line.setAttribute('y1',a.bot);
      line.setAttribute('x2',b.x); line.setAttribute('y2',b.top);
      line.setAttribute('stroke','#4a82c4'); line.setAttribute('stroke-width','1.5');
      line.setAttribute('marker-end','url(#arr)');
      svg.appendChild(line);
    }
  });
  STATE.transitions.forEach(t=>{
    const a=getCenter(layout,t.id);
    const dAfterIdx=STATE.dances.findIndex(d=>d.id===t.after);
    if(dAfterIdx+1<STATE.dances.length){
      const b=getCenter(layout,STATE.dances[dAfterIdx+1].id);
      const line=document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d',`M${a.right} ${a.mid_y} L${b.right+8} ${a.mid_y} L${b.right+8} ${b.mid_y} L${b.right} ${b.mid_y}`);
      line.setAttribute('stroke','#4a82c4'); line.setAttribute('stroke-width','1.5');
      line.setAttribute('fill','none'); line.setAttribute('marker-end','url(#arr)');
      svg.appendChild(line);
    }
  });
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='';
  STATE.dances.forEach((d,i)=>{
    const t=STATE.transitions.find(tr=>tr.after===d.id);
    const card=document.createElement('div');
    card.innerHTML=`
      <div class="sidebar-title">Dance ${i+1}</div>
      <div class="card">
        <div class="card-header">
          <div class="card-num">${i+1}</div>
          <input class="card-title-input" value="${esc(d.title)}" oninput="upDance('${d.id}','title',this.value)" placeholder="Dance name…">
          <button class="btn-danger" onclick="removeDance('${d.id}')">✕</button>
        </div>
        <div class="field-row"><div class="field-label">Duration (min)</div><input type="text" value="${esc(d.dur)}" oninput="upDance('${d.id}','dur',this.value)" placeholder="e.g. 3:30"></div>
        <div class="field-row"><div class="field-label">Dancers</div><textarea rows="2" oninput="upDance('${d.id}','dancers',this.value)" placeholder="Comma separated…">${esc(d.dancers)}</textarea></div>
        <div class="field-row"><div class="field-label">Props</div><textarea rows="2" oninput="upDance('${d.id}','props',this.value)" placeholder="Props used…">${esc(d.props)}</textarea></div>
        <div class="field-row"><div class="field-label">Notes</div><textarea rows="2" oninput="upDance('${d.id}','notes',this.value)" placeholder="Cues, lighting…">${esc(d.notes)}</textarea></div>
      </div>
    `;
    if(t){
      const tCard=document.createElement('div');
      tCard.innerHTML=`
        <div class="sidebar-title" style="color:#1a6640">Transition ${i+1} → ${i+2}</div>
        <div class="card trans-card">
          <div class="trans-label"><span class="trans-arrow">↓</span> After ${esc(d.title)}</div>
          <div class="field-row"><div class="field-label">Duration</div><input type="text" value="${esc(t.dur)}" oninput="upTrans('${t.id}','dur',this.value)" placeholder="e.g. 1:00"></div>
          <div class="field-row"><div class="field-label">Dancer movements</div><textarea rows="2" oninput="upTrans('${t.id}','dancers',this.value)" placeholder="Who exits/enters…">${esc(t.dancers)}</textarea></div>
          <div class="field-row"><div class="field-label">Prop changes</div><textarea rows="2" oninput="upTrans('${t.id}','props',this.value)" placeholder="Add/remove props…">${esc(t.props)}</textarea></div>
          <div class="field-row"><div class="field-label">Notes</div><input type="text" value="${esc(t.notes)}" oninput="upTrans('${t.id}','notes',this.value)" placeholder="Blackout, cue…"></div>
        </div>
      `;
      card.appendChild(tCard);
    }
    sb.appendChild(card);
  });
}

function upDance(id,field,val){ const d=STATE.dances.find(x=>x.id===id); if(d){d[field]=val;} renderDiagram(); }
function upTrans(id,field,val){ const t=STATE.transitions.find(x=>x.id===id); if(t){t[field]=val;} renderDiagram(); }

function addDance(){
  const newId='d'+nextId++;
  const newTId='t'+(nextId++);
  const prev=STATE.dances[STATE.dances.length-1];
  STATE.dances.push({id:newId,title:'Dance '+(STATE.dances.length+1),dur:'',dancers:'',props:'',notes:''});
  if(prev) STATE.transitions.push({id:newTId,after:prev.id,dancers:'',props:'',dur:'',notes:''});
  renderSidebar(); renderDiagram();
}

function removeDance(id){
  if(STATE.dances.length<=1) return;
  STATE.dances=STATE.dances.filter(d=>d.id!==id);
  STATE.transitions=STATE.transitions.filter(t=>t.after!==id);
  STATE.transitions=STATE.transitions.filter(t=>STATE.dances.find(d=>d.id===t.after));
  renderSidebar(); renderDiagram();
}

function toggleSummary(){
  const panel=document.getElementById('summary-panel');
  panel.classList.toggle('open');
  if(!panel.classList.contains('open')) return;
  const cnt=document.getElementById('summary-content');
  const dancers=allDancers();
  const props=allProps();
  let html='<div style="font-weight:600;font-size:12px;color:#1a3a5c;margin-bottom:8px">Dancers</div>';
  dancers.forEach(n=>{
    const locs=whereIsDancer(n).map(l=>l.label).join(', ')||'Not placed';
    html+=`<div class="srow"><span class="srow-name">${esc(n)}</span><span class="srow-loc">${esc(locs)}</span></div>`;
  });
  html+='<div style="font-weight:600;font-size:12px;color:#1a3a5c;margin:14px 0 8px">Props</div>';
  props.forEach(p=>{
    const locs=whereIsProp(p).map(l=>l.label).join(', ')||'Not placed';
    html+=`<div class="srow"><span class="srow-name">${esc(p)}</span><span class="srow-loc">${esc(locs)}</span></div>`;
  });
  let total=0; STATE.dances.forEach(d=>{const v=parseFloat(d.dur);if(!isNaN(v))total+=v;});
  let ttrans=0; STATE.transitions.forEach(t=>{const v=parseFloat(t.dur);if(!isNaN(v))ttrans+=v;});
  html+=`<div style="margin-top:16px;background:#f4f7fb;border-radius:6px;padding:10px 12px;font-size:12px">
    <div class="srow"><span>Total dances</span><span><b>${STATE.dances.length}</b></span></div>
    <div class="srow"><span>Stage time</span><span><b>${total.toFixed(1)} min</b></span></div>
    <div class="srow"><span>Transition time</span><span><b>${ttrans.toFixed(1)} min</b></span></div>
    <div class="srow"><span>Unique dancers</span><span><b>${dancers.length}</b></span></div>
  </div>`;
  cnt.innerHTML=html;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

renderSidebar();
